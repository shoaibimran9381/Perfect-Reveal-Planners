<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Owner Dashboard - Perfect Reveal Planners</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&amp;family=Jost:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --gold: #c9a84c; --cream: #fdf8ee; --bg: #1a1a1a; --line: rgba(201,168,76,.2); }
    body { background: var(--bg); color: var(--cream); font-family: 'Jost', Arial, sans-serif; min-height: 100vh; padding: 2rem; }
    button, input, textarea, select { font: inherit; }
    .admin-container { display: none; max-width: 1000px; margin: 0 auto; }
    .admin-header { border-bottom: 2px solid var(--gold); margin-bottom: 3rem; padding-bottom: 2rem; text-align: center; }
    .admin-header h1 { color: var(--gold); font-family: 'Cormorant Garamond', serif; font-size: 2.7rem; margin-bottom: .45rem; }
    .admin-header p { color: rgba(253,248,238,.6); font-size: .9rem; }
    .logout-btn { background: var(--gold); border: 0; border-radius: 3px; color: var(--bg); cursor: pointer; display: none; font-weight: 500; padding: .7rem 1.5rem; position: fixed; right: 2rem; top: 2rem; }
    .tabs { border-bottom: 1px solid var(--line); display: flex; gap: 1rem; margin-bottom: 2rem; }
    .tab-button { background: transparent; border: 0; border-bottom: 2px solid transparent; color: rgba(253,248,238,.6); cursor: pointer; font-weight: 500; padding: 1rem 1.5rem; }
    .tab-button.active, .tab-button:hover { border-bottom-color: var(--gold); color: var(--gold); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .stats { display: grid; gap: 1rem; grid-template-columns: repeat(3, minmax(120px, 1fr)); margin-bottom: 2rem; }
    .stat-box, .review-card, .form-panel { background: rgba(201,168,76,.05); border: 1px solid rgba(201,168,76,.15); border-radius: 4px; padding: 1.5rem; }
    .stat-box { text-align: center; }
    .stat-number { color: var(--gold); font-family: 'Cormorant Garamond', serif; font-size: 2.1rem; }
    .stat-label { color: rgba(253,248,238,.6); font-size: .78rem; letter-spacing: .1em; text-transform: uppercase; }
    .review-card { margin-bottom: 1.4rem; }
    .review-name { color: var(--gold); font-weight: 600; }
    .review-meta { color: rgba(253,248,238,.55); font-size: .82rem; margin: .2rem 0 1rem; }
    .review-rating { color: var(--gold); margin-bottom: 1rem; }
    .review-text { background: rgba(0,0,0,.3); border-left: 2px solid var(--gold); color: rgba(253,248,238,.83); font-style: italic; line-height: 1.65; margin-bottom: 1.2rem; padding: 1rem; }
    .response { border-top: 1px solid rgba(201,168,76,.12); color: rgba(253,248,238,.65); font-size: .9rem; font-style: italic; margin-bottom: 1rem; padding-top: 1rem; }
    .response strong { color: var(--gold); display: block; font-style: normal; margin-bottom: .35rem; }
    .review-actions, .form-actions { display: flex; flex-wrap: wrap; gap: .8rem; }
    .action-btn, .outline-btn { background: transparent; border: 1px solid var(--gold); border-radius: 3px; color: var(--gold); cursor: pointer; padding: .58rem 1.1rem; transition: background .2s, color .2s; }
    .action-btn:hover, .outline-btn:hover { background: var(--gold); color: var(--bg); }
    .btn-approve { border-color: #4ade80; color: #4ade80; }
    .btn-approve:hover { background: #4ade80; }
    .btn-reject, .btn-delete { border-color: #f87171; color: #f87171; }
    .btn-reject:hover, .btn-delete:hover { background: #f87171; }
    .btn-submit { background: var(--gold); border: 0; border-radius: 3px; color: var(--bg); cursor: pointer; font-weight: 600; padding: .8rem 1.5rem; }
    .btn-submit:disabled { cursor: wait; opacity: .65; }
    .form-panel h3 { color: var(--gold); font-family: 'Cormorant Garamond', serif; font-size: 1.55rem; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { color: var(--gold); display: block; font-size: .8rem; letter-spacing: .1em; margin-bottom: .45rem; text-transform: uppercase; }
    .form-group input, .form-group textarea, .form-group select { background: rgba(0,0,0,.3); border: 1px solid var(--line); border-radius: 3px; color: var(--cream); padding: .8rem; width: 100%; }
    .form-group textarea { min-height: 100px; resize: vertical; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--gold); outline: 0; }
    .message { border-radius: 4px; display: none; margin-bottom: 1.2rem; padding: .9rem; }
    .message.success { background: rgba(74,222,128,.1); border: 1px solid #4ade80; color: #86efac; }
    .message.error { background: rgba(248,113,113,.1); border: 1px solid #f87171; color: #fca5a5; }
    .empty-message { color: rgba(253,248,238,.45); font-style: italic; padding: 3rem; text-align: center; }
    .login-screen { align-items: center; background: var(--bg); display: flex; inset: 0; justify-content: center; position: fixed; z-index: 1000; }
    .login-panel { background: rgba(201,168,76,.05); border: 1px solid var(--line); border-radius: 4px; max-width: 410px; padding: 3rem; text-align: center; width: 90%; }
    .login-panel h1 { color: var(--gold); font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; margin-bottom: .6rem; }
    .login-panel p { color: rgba(253,248,238,.6); margin-bottom: 1.8rem; }
    .toolbar { align-items: center; display: flex; justify-content: flex-end; margin-bottom: 1.2rem; }
    @media (max-width: 640px) {
      body { padding: 1rem; padding-top: 5rem; }
      .logout-btn { right: 1rem; top: 1rem; }
      .tabs { overflow-x: auto; }
      .tab-button { padding: .8rem; white-space: nowrap; }
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <button class="logout-btn" id="logoutButton" onclick="logout()">Logout</button>

  <section id="loginScreen" class="login-screen">
    <form id="loginForm" class="login-panel">
      <h1>Owner Access</h1>
      <p>Sign in with your Firebase administrator account</p>
      <div id="loginMessage" class="message error"></div>
      <div class="form-group"><input type="email" id="emailInput" autocomplete="username" placeholder="Admin email" required></div>
      <div class="form-group"><input type="password" id="passwordInput" autocomplete="current-password" placeholder="Password" required></div>
      <button class="btn-submit" type="submit" style="width:100%;">Sign In</button>
    </form>
  </section>

  <main id="adminScreen" class="admin-container">
    <header class="admin-header">
      <h1>Owner Dashboard</h1>
      <p>Manage client review submissions and published testimonials</p>
    </header>
    <div id="message" class="message"></div>
    <div id="stats" class="stats"></div>
    <nav class="tabs" aria-label="Dashboard areas">
      <button class="tab-button active" data-tab="pending" onclick="showTab('pending', this)">Pending Reviews</button>
      <button class="tab-button" data-tab="approved" onclick="showTab('approved', this)">Published Reviews</button>
      <button class="tab-button" data-tab="add-manual" onclick="showTab('add-manual', this)">Add Review</button>
    </nav>

    <section id="pending" class="tab-content active"><div id="pendingReviews"></div></section>
    <section id="approved" class="tab-content">
      <div class="toolbar"></div>
      <div id="approvedReviews"></div>
    </section>
    <section id="add-manual" class="tab-content">
      <form id="manualReviewForm" class="form-panel">
        <h3>Add a Published Review</h3>
        <div class="form-group"><label for="manualName">Client Name *</label><input type="text" id="manualName" required></div>
        <div class="form-group"><label for="manualRole">Occasion / Event *</label><input type="text" id="manualRole" placeholder="e.g., Anniversary Surprise - Hyderabad" required></div>
        <div class="form-group">
          <label for="manualRating">Rating *</label>
          <select id="manualRating" required>
            <option value="">Select rating...</option>
            <option value="5">5 Stars - Excellent</option><option value="4">4 Stars - Very Good</option>
            <option value="3">3 Stars - Good</option><option value="2">2 Stars - Fair</option><option value="1">1 Star - Poor</option>
          </select>
        </div>
        <div class="form-group"><label for="manualText">Review Text *</label><textarea id="manualText" required></textarea></div>
        <div class="form-group"><label for="manualResponse">Owner Response</label><textarea id="manualResponse"></textarea></div>
        <div class="form-actions"><button class="btn-submit" type="submit">Publish Review</button><button class="outline-btn" type="reset">Clear</button></div>
      </form>
    </section>
  </main>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
