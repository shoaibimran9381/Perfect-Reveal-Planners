<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Dashboard - Perfect Reveal Planners</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Jost', 'Arial', sans-serif;
      background: #1a1a1a;
      color: #fdf8ee;
      min-height: 100vh;
      padding: 2rem;
    }

    .admin-container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .admin-header {
      text-align: center;
      margin-bottom: 3rem;
      border-bottom: 2px solid #c9a84c;
      padding-bottom: 2rem;
    }

    .admin-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      color: #c9a84c;
      margin-bottom: 0.5rem;
    }

    .admin-header p {
      color: rgba(253, 248, 238, 0.6);
      font-size: 0.9rem;
    }

    .logout-btn {
      position: absolute;
      top: 2rem;
      right: 2rem;
      background: #c9a84c;
      color: #1a1a1a;
      border: none;
      padding: 0.7rem 1.5rem;
      cursor: pointer;
      font-weight: 500;
      border-radius: 3px;
      transition: all 0.3s;
    }

    .logout-btn:hover {
      background: #e8c956;
    }

    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid rgba(201, 168, 76, 0.2);
    }

    .tab-button {
      padding: 1rem 1.5rem;
      background: transparent;
      border: none;
      color: rgba(253, 248, 238, 0.6);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: all 0.3s;
    }

    .tab-button.active {
      color: #c9a84c;
      border-bottom-color: #c9a84c;
    }

    .tab-button:hover {
      color: #c9a84c;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .review-card {
      background: rgba(201, 168, 76, 0.05);
      border: 1px solid rgba(201, 168, 76, 0.15);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border-radius: 4px;
    }

    .review-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 1rem;
    }

    .review-meta {
      flex: 1;
    }

    .review-name {
      font-weight: 600;
      color: #c9a84c;
      font-size: 1rem;
      margin-bottom: 0.3rem;
    }

    .review-email {
      font-size: 0.8rem;
      color: rgba(253, 248, 238, 0.5);
      margin-bottom: 0.5rem;
    }

    .review-role {
      font-size: 0.8rem;
      color: rgba(253, 248, 238, 0.6);
    }

    .review-rating {
      color: #c9a84c;
      font-weight: 500;
      margin-bottom: 1rem;
    }

    .review-text {
      color: rgba(253, 248, 238, 0.8);
      line-height: 1.6;
      font-style: italic;
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.3);
      border-left: 2px solid #c9a84c;
    }

    .review-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .action-btn {
      padding: 0.6rem 1.2rem;
      border: 1px solid;
      background: transparent;
      cursor: pointer;
      font-size: 0.85rem;
      border-radius: 3px;
      transition: all 0.3s;
      font-weight: 500;
    }

    .btn-approve {
      color: #4ade80;
      border-color: #4ade80;
    }

    .btn-approve:hover {
      background: #4ade80;
      color: #1a1a1a;
    }

    .btn-reject {
      color: #f87171;
      border-color: #f87171;
    }

    .btn-reject:hover {
      background: #f87171;
      color: #1a1a1a;
    }

    .btn-edit {
      color: #60a5fa;
      border-color: #60a5fa;
    }

    .btn-edit:hover {
      background: #60a5fa;
      color: #1a1a1a;
    }

    .btn-delete {
      color: #f87171;
      border-color: #f87171;
    }

    .btn-delete:hover {
      background: #f87171;
      color: #1a1a1a;
    }

    .empty-message {
      text-align: center;
      padding: 3rem;
      color: rgba(253, 248, 238, 0.4);
      font-style: italic;
    }

    .add-manual-form {
      background: rgba(201, 168, 76, 0.05);
      border: 1px solid rgba(201, 168, 76, 0.15);
      padding: 2rem;
      border-radius: 4px;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #c9a84c;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 0.8rem;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(201, 168, 76, 0.2);
      color: #fdf8ee;
      font-family: inherit;
      border-radius: 3px;
      transition: all 0.3s;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: #c9a84c;
      background: rgba(201, 168, 76, 0.1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-actions {
      display: flex;
      gap: 1rem;
    }

    .btn-submit {
      background: #c9a84c;
      color: #1a1a1a;
      border: none;
      padding: 0.8rem 2rem;
      cursor: pointer;
      font-weight: 600;
      border-radius: 3px;
      transition: all 0.3s;
    }

    .btn-submit:hover {
      background: #e8c956;
    }

    .btn-cancel {
      background: transparent;
      color: #c9a84c;
      border: 1px solid #c9a84c;
      padding: 0.8rem 2rem;
      cursor: pointer;
      font-weight: 600;
      border-radius: 3px;
      transition: all 0.3s;
    }

    .btn-cancel:hover {
      background: #c9a84c;
      color: #1a1a1a;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-box {
      background: rgba(201, 168, 76, 0.05);
      border: 1px solid rgba(201, 168, 76, 0.15);
      padding: 1.5rem;
      text-align: center;
      border-radius: 4px;
    }

    .stat-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      color: #c9a84c;
      font-weight: 300;
    }

    .stat-label {
      font-size: 0.8rem;
      color: rgba(253, 248, 238, 0.6);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 0.5rem;
    }

    .message {
      padding: 1rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .message.success {
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid #4ade80;
      color: #86efac;
    }

    .message.error {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid #f87171;
      color: #fca5a5;
    }
  </style>
</head>
<body>
  <button class="logout-btn" onclick="logout()">Logout</button>

  <div id="loginScreen" class="login-screen" style="display: none;">
    <!-- Login handled by JavaScript -->
  </div>

  <div id="adminScreen" class="admin-container" style="display: none;">
    <div class="admin-header">
      <h1>Owner Dashboard</h1>
      <p>Manage client reviews and approvals</p>
    </div>

    <div class="tabs">
      <button class="tab-button active" onclick="showTab('pending')">Pending Reviews</button>
      <button class="tab-button" onclick="showTab('approved')">Approved Reviews</button>
      <button class="tab-button" onclick="showTab('add-manual')">Add Manual Review</button>
    </div>

    <div id="stats" class="stats"></div>
    <div id="message"></div>

    <!-- Pending Reviews Tab -->
    <div id="pending" class="tab-content active">
      <div id="pendingReviews"></div>
    </div>

    <!-- Approved Reviews Tab -->
    <div id="approved" class="tab-content">
      <div id="approvedReviews"></div>
    </div>

    <!-- Add Manual Review Tab -->
    <div id="add-manual" class="tab-content">
      <div class="add-manual-form">
        <h3 style="color: #c9a84c; margin-bottom: 1.5rem; font-family: 'Cormorant Garamond', serif;">Add Review Manually</h3>
        <div class="form-group">
          <label>Client Name *</label>
          <input type="text" id="manualName" placeholder="Enter client name" required>
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="manualEmail" placeholder="Enter email" required>
        </div>
        <div class="form-group">
          <label>Occasion/Role *</label>
          <input type="text" id="manualRole" placeholder="e.g., Anniversary Surprise · Hyderabad" required>
        </div>
        <div class="form-group">
          <label>Rating *</label>
          <select id="manualRating" required>
            <option value="">Select rating...</option>
            <option value="5">⭐⭐⭐⭐⭐ 5 Stars</option>
            <option value="4">⭐⭐⭐⭐ 4 Stars</option>
            <option value="3">⭐⭐⭐ 3 Stars</option>
            <option value="2">⭐⭐ 2 Stars</option>
            <option value="1">⭐ 1 Star</option>
          </select>
        </div>
        <div class="form-group">
          <label>Review Text *</label>
          <textarea id="manualText" placeholder="Enter the review text..." required></textarea>
        </div>
        <div class="form-group">
          <label>Owner Response</label>
          <textarea id="manualResponse" placeholder="Enter owner's response (optional)..." style="min-height: 80px;"></textarea>
        </div>
        <div class="form-actions">
          <button class="btn-submit" onclick="addManualReview()">Add & Auto-Approve</button>
          <button class="btn-cancel" onclick="resetManualForm()">Clear</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const OWNER_PASSWORD = 'muthu123'; // Change this password

    function checkAuth() {
      const isAuthenticated = sessionStorage.getItem('ownerAuth') === 'true';
      if (!isAuthenticated) {
        showLoginScreen();
      } else {
        loadDashboard();
      }
    }

    function showLoginScreen() {
      const loginScreen = document.getElementById('loginScreen');
      loginScreen.style.display = 'flex';
      loginScreen.innerHTML = `
        <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; z-index: 1000;">
          <div style="background: rgba(201, 168, 76, 0.05); border: 1px solid rgba(201, 168, 76, 0.2); padding: 3rem; border-radius: 4px; max-width: 400px; width: 90%; text-align: center;">
            <h1 style="font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: #c9a84c; margin-bottom: 1rem;">Owner Access</h1>
            <p style="color: rgba(253, 248, 238, 0.6); margin-bottom: 2rem;">Enter password to access dashboard</p>
            <input type="password" id="passwordInput" placeholder="Enter password" style="width: 100%; padding: 0.8rem; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(201, 168, 76, 0.2); color: #fdf8ee; border-radius: 3px; margin-bottom: 1rem; font-size: 1rem;" onkeypress="if(event.key==='Enter') authenticate()">
            <button onclick="authenticate()" style="width: 100%; padding: 0.8rem; background: #c9a84c; color: #1a1a1a; border: none; border-radius: 3px; cursor: pointer; font-weight: 600; transition: all 0.3s;" onmouseover="this.style.background='#e8c956'" onmouseout="this.style.background='#c9a84c'">Login</button>
          </div>
        </div>
      `;
    }

    function authenticate() {
      const password = document.getElementById('passwordInput').value;
      if (password === OWNER_PASSWORD) {
        sessionStorage.setItem('ownerAuth', 'true');
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminScreen').style.display = 'block';
        loadDashboard();
      } else {
        alert('Invalid password!');
        document.getElementById('passwordInput').value = '';
      }
    }

    function logout() {
      sessionStorage.removeItem('ownerAuth');
      location.reload();
    }

    function showTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');

      if (tabName === 'pending') loadPendingReviews();
      if (tabName === 'approved') loadApprovedReviews();
    }

    function loadDashboard() {
      // Initialize reviewsData from JSON if not already set
      if (!localStorage.getItem('reviewsData')) {
        fetch('./data/reviews.json')
          .then(r => r.json())
          .then(reviews => {
            localStorage.setItem('reviewsData', JSON.stringify(reviews));
            loadStats();
            loadPendingReviews();
          })
          .catch(() => {
            loadStats();
            loadPendingReviews();
          });
      } else {
        loadStats();
        loadPendingReviews();
      }
    }

    function loadStats() {
      const pending = JSON.parse(localStorage.getItem('pendingReviews') || '[]');
      const approved = JSON.parse(localStorage.getItem('reviewsData') || '[]');

      const statsHtml = `
        <div class="stat-box">
          <div class="stat-number">${pending.length}</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-box">
          <div class="stat-number">${approved.length}</div>
          <div class="stat-label">Approved</div>
        </div>
        <div class="stat-box">
          <div class="stat-number">${pending.length + approved.length}</div>
          <div class="stat-label">Total</div>
        </div>
      `;
      document.getElementById('stats').innerHTML = statsHtml;
    }

    function loadPendingReviews() {
      const pending = JSON.parse(localStorage.getItem('pendingReviews') || '[]');
      if (pending.length === 0) {
        document.getElementById('pendingReviews').innerHTML = '<div class="empty-message">No pending reviews</div>';
        return;
      }
      const html = pending.map((review, idx) => `
        <div class="review-card">
          <div class="review-header">
            <div class="review-meta">
              <div class="review-name">${review.name}</div>
              <div class="review-email">${review.email}</div>
              <div class="review-role">${review.role}</div>
            </div>
          </div>
          <div class="review-rating">${'★'.repeat(review.rating)}</div>
          <div class="review-text">"${review.text}"</div>
          <div class="review-actions">
            <button class="action-btn btn-approve" onclick="approveReview(${idx})">Approve</button>
            <button class="action-btn btn-reject" onclick="rejectReview(${idx})">Reject</button>
            <button class="action-btn btn-edit" onclick="editReview(${idx})">Edit</button>
          </div>
        </div>
      `).join('');
      document.getElementById('pendingReviews').innerHTML = html;
    }

    function loadApprovedReviews() {
      const reviews = JSON.parse(localStorage.getItem('reviewsData') || '[]');
      if (reviews.length === 0) {
        document.getElementById('approvedReviews').innerHTML = '<div class="empty-message">No approved reviews yet</div>';
        return;
      }
      const html = reviews.map((review, idx) => `
        <div class="review-card">
          <div class="review-header">
            <div class="review-meta">
              <div class="review-name">${review.name}</div>
              <div class="review-email">${review.email || 'N/A'}</div>
              <div class="review-role">${review.role}</div>
            </div>
          </div>
          <div class="review-rating">${'★'.repeat(review.rating)}</div>
          <div class="review-text">"${review.text}"</div>
          <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(201, 168, 76, 0.1);">
            <div style="font-size: 0.85rem; color: #c9a84c; margin-bottom: 0.5rem;">muthu nani responded:</div>
            <div style="color: rgba(253, 248, 238, 0.7); font-style: italic;">"${review.ownerResponse || 'Thank you for your feedback!'}"</div>
          </div>
          <div class="review-actions" style="margin-top: 1.5rem;">
            <button class="action-btn btn-delete" onclick="deleteApprovedReview(${idx})">Delete</button>
          </div>
        </div>
      `).join('');
      document.getElementById('approvedReviews').innerHTML = html;
    }

    function approveReview(index) {
      const pending = JSON.parse(localStorage.getItem('pendingReviews') || '[]');
      const approved = JSON.parse(localStorage.getItem('reviewsData') || '[]');

      const review = pending[index];
      review.email = review.email || '';
      review.ownerResponse = review.ownerResponse || 'Thank you for your feedback!';

      approved.push(review);
      pending.splice(index, 1);

      localStorage.setItem('reviewsData', JSON.stringify(approved));
      localStorage.setItem('pendingReviews', JSON.stringify(pending));

      showMessage('Review approved!', 'success');
      loadDashboard();
      loadPendingReviews();
    }

    function rejectReview(index) {
      const pending = JSON.parse(localStorage.getItem('pendingReviews') || '[]');
      pending.splice(index, 1);
      localStorage.setItem('pendingReviews', JSON.stringify(pending));
      showMessage('Review rejected!', 'success');
      loadStats();
      loadPendingReviews();
    }

    function editReview(index) {
      alert('Edit functionality - implement as needed');
    }

    function deleteApprovedReview(index) {
      if (!confirm('Are you sure you want to delete this review?')) return;
      const reviews = JSON.parse(localStorage.getItem('reviewsData') || '[]');
      reviews.splice(index, 1);
      localStorage.setItem('reviewsData', JSON.stringify(reviews));
      showMessage('Review deleted!', 'success');
      loadStats();
      loadApprovedReviews();
    }

    function addManualReview() {
      const name = document.getElementById('manualName').value.trim();
      const email = document.getElementById('manualEmail').value.trim();
      const role = document.getElementById('manualRole').value.trim();
      const rating = parseInt(document.getElementById('manualRating').value);
      const text = document.getElementById('manualText').value.trim();
      const response = document.getElementById('manualResponse').value.trim();

      if (!name || !email || !role || !rating || !text) {
        showMessage('Please fill all required fields!', 'error');
        return;
      }

      const newReview = {
        id: Date.now(),
        name,
        email,
        role,
        rating,
        text,
        ownerResponse: response || 'Thank you for your feedback!',
        date: new Date().toISOString().split('T')[0]
      };

      const reviews = JSON.parse(localStorage.getItem('reviewsData') || '[]');
      reviews.push(newReview);
      localStorage.setItem('reviewsData', JSON.stringify(reviews));
      showMessage('Review added and auto-approved!', 'success');
      resetManualForm();
      loadDashboard();
    }

    function resetManualForm() {
      document.getElementById('manualName').value = '';
      document.getElementById('manualEmail').value = '';
      document.getElementById('manualRole').value = '';
      document.getElementById('manualRating').value = '';
      document.getElementById('manualText').value = '';
      document.getElementById('manualResponse').value = '';
    }

    function showMessage(text, type) {
      const msgEl = document.getElementById('message');
      msgEl.className = `message ${type}`;
      msgEl.textContent = text;
      setTimeout(() => msgEl.textContent = '', 3000);
    }

    // Initialize on page load
    checkAuth();
  </script>
</body>
</html>
